spring:
  application:
    name: careerpilot-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/careerpilot}
    username: ${SPRING_DATASOURCE_USERNAME:careerpilot}
    password: ${SPRING_DATASOURCE_PASSWORD:careerpilot}
    hikari:
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc.lob.non_contextual_creation: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: careerpilot
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

ai:
  provider: ${AI_PROVIDER:gemini}
  model: ${AI_MODEL:gemini-2.5-pro}
  gemini:
    api-key: ${GEMINI_API_KEY:}

agent-service:
  base-url: ${AGENT_SERVICE_URL:http://localhost:8088}
  connect-timeout-ms: 5000
  read-timeout-ms: 120000

security:
  jwt:
    secret: ${JWT_SECRET:}
    access-token-ttl-minutes: 60
    refresh-token-ttl-days: 30
  rate-limit:
    auth-per-minute: 10
    api-per-minute: 120

storage:
  s3:
    endpoint: ${S3_ENDPOINT:}
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET:careerpilot}
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
    path-style: true

kafka:
  topics:
    workflow-events: careerpilot.workflow.events
    audit-events: careerpilot.audit.events

logging:
  level:
    root: INFO
    ai.careerpilot: DEBUG
