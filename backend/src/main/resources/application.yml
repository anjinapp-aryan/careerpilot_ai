spring:
  application:
    name: careerpilot-backend
  datasource:
    # DATABASE_URL is a JDBC URL. Neon credentials can be embedded as query
    # params (?user=...&password=...) so one var covers auth too; the
    # SPRING_DATASOURCE_USERNAME/PASSWORD vars below remain as an optional
    # override if you'd rather keep credentials out of the URL string.
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/careerpilot}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc.lob.non_contextual_creation: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      # Single connection-string form: redis://[:password@]host:port, or
      # rediss://... for TLS (Upstash and most managed Redis require TLS).
      url: ${REDIS_URL:redis://localhost:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: careerpilot
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  web:
    error:
      include-message: always

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

ai:
  provider: ${AI_PROVIDER:gemini}
  model: ${AI_MODEL:gemini-2.5-flash}   # flash is free-tier eligible; pro returns 429 limit:0 on free keys
  gemini:
    api-key: ${GEMINI_API_KEY:}
  # ---- AI Gateway: single entry point for all LLM calls, with failover ----
  gateway:
    primary: ${PRIMARY_PROVIDER:deepseek}
    # Failover priority: DeepSeek → Gemini → Groq → Qwen → GLM (provider diversity
    # is intentional — NVIDIA, Google, Groq, NVIDIA, Zhipu — so one vendor's
    # outage/quota never takes out two consecutive hops). Unconfigured providers
    # (no API key) are skipped automatically, so Groq and GLM simply sit idle
    # until GROQ_API_KEY / GLM_API_KEY are set — the live production order is
    # DeepSeek → Gemini → Qwen until those keys are supplied.
    order: ${AI_PROVIDER_ORDER:deepseek,gemini,groq,qwen,openrouter}
    default-temperature: 0.4
    # Phase A Enterprise Smart Router feature flag. false = pure sequential
    # failover over `order` (current production behavior, unchanged). Task-aware
    # routing using `routing` below is wired in a later phase and only takes
    # effect when this is true.
    smart-router-enabled: ${AI_SMART_ROUTER_ENABLED:false}
    # Per-task provider preference lists. LOADED BUT NOT CONSULTED in Phase A
    # (only used when smart-router-enabled=true). Lets per-task provider order
    # change via config alone — no code change. Unknown providers in a list are
    # ignored; unconfigured ones are skipped, exactly like `order`.
    routing:
      resumeOptimization: [deepseek, gemini, openrouter]
      atsOptimization: [deepseek, gemini, qwen]
      jobMatching: [deepseek, qwen, openrouter]
      chatbot: [deepseek, gemini, openrouter]
      interviewPreparation: [gemini, deepseek, groq]
      careerStrategy: [gemini, deepseek, openrouter]
      salaryIntelligence: [gemini, qwen, openrouter]
    providers:
      gemini:
        display-name: Gemini
        api-key: ${GEMINI_API_KEY:}
        model: ${GEMINI_MODEL:gemini-2.5-flash}
        base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
        timeout-ms: 15000
      deepseek:
        display-name: DeepSeek
        api-key: ${DEEP_SHEEK_NVIDIA_API_KEY:}
        # NVIDIA NIM IDs are vendor-namespaced; the bare "deepseek-v4-flash"
        # 404s. Keep the "deepseek-ai/" prefix in the default.
        model: ${NVIDIA_DEEPSEEK_MODEL:deepseek-ai/deepseek-v4-flash}
        base-url: ${NVIDIA_BASE_URL:https://integrate.api.nvidia.com/v1}
        timeout-ms: 20000
      groq:
        display-name: Groq
        api-key: ${GROQ_API_KEY:}
        model: ${GROQ_MODEL:llama-3.3-70b-versatile}
        base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}
        timeout-ms: 20000
      qwen:
        display-name: Qwen
        api-key: ${QWEN3_NVIDIA_API_KEY:}
        model: ${NVIDIA_QWEN_MODEL:qwen/qwen3-next-80b-a3b-instruct}
        base-url: ${NVIDIA_BASE_URL:https://integrate.api.nvidia.com/v1}
        timeout-ms: 25000
      # OpenRouter — last-resort fallback, OpenAI-compatible. Provides access to
      # many models (free and paid). api-key is empty by default → provider is
      # UNAVAILABLE and skipped. Supply OPENROUTER_API_KEY to activate (it then
      # joins the chain after Qwen automatically). Model can be any OpenRouter-
      # supported model (e.g., qwen/qwen3-next-80b-a3b-instruct:free for free tier).
      openrouter:
        display-name: OpenRouter
        api-key: ${OPENROUTER_API_KEY:}
        model: ${OPENROUTER_MODEL:qwen/qwen3-next-80b-a3b-instruct:free}
        base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
        timeout-ms: 25000

  # ---- Embeddings: pgvector semantic search (Phase 2 Increment A) ----
  # Gated DARK by default. When enabled, discovered jobs (post-ingest, capped) and resumes (on
  # upload) get a Gemini text-embedding-004 vector (768-d, matching the vector(768) columns), and
  # GET /api/jobs/search/semantic does a cosine nearest-neighbor read. Reuses the gemini API key
  # from ai.gateway.providers.gemini — no separate key. Default off = zero new AI cost / no behavior
  # change; instant rollback by flipping the flag.
  embeddings:
    enabled: ${EMBEDDINGS_ENABLED:false}
    # gemini-embedding-001 supports outputDimensionality; we request 768 to match the vector(768)
    # columns. (text-embedding-004 is not available on this API key — it 404s.)
    model: ${EMBEDDINGS_MODEL:gemini-embedding-001}
    dimensions: ${EMBEDDINGS_DIMENSIONS:768}
    # Max characters of source text sent to the embedding API (cost + payload guard).
    max-chars: ${EMBEDDINGS_MAX_CHARS:8000}
    # Cap on how many missing-embedding jobs are embedded per discovery run (cost guard).
    max-per-run: ${EMBEDDINGS_MAX_PER_RUN:200}

# ---- Resilience4j: retry + circuit breaker per provider ----
resilience4j:
  retry:
    instances:
      # 2 retries before failing over (3 attempts total), exponential backoff
      # 1s → 2s. Quota/rate-limit (429) is mapped to QuotaExceededException and
      # ignored here, so a rate-limited provider fails over immediately instead of
      # burning the retry budget. CallNotPermittedException (open circuit) likewise
      # short-circuits straight to the next provider.
      gemini: &retryDefaults
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.lang.Exception
        ignore-exceptions:
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
          - ai.careerpilot.ai.QuotaExceededException
      deepseek: *retryDefaults
      groq: *retryDefaults
      qwen: *retryDefaults
      openrouter: *retryDefaults
  circuitbreaker:
    instances:
      gemini: &cbDefaults
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 8
        failure-rate-threshold: 60
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      deepseek: *cbDefaults
      groq: *cbDefaults
      qwen: *cbDefaults
      openrouter: *cbDefaults

agent-service:
  base-url: ${AGENT_SERVICE_URL:http://localhost:8088}
  connect-timeout-ms: 5000
  read-timeout-ms: 120000

security:
  jwt:
    secret: ${JWT_SECRET:}
    access-token-ttl-minutes: 60
    refresh-token-ttl-days: 30
  rate-limit:
    auth-per-minute: 10
    api-per-minute: 120
  # Comma-separated exact origins — no wildcards. Set to your Vercel URL(s),
  # e.g. https://careerpilot-ai.vercel.app,https://careerpilot-ai-git-main.vercel.app
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

storage:
  s3:
    endpoint: ${MINIO_ENDPOINT:}
    region: ${S3_REGION:us-east-1}
    bucket: ${MINIO_BUCKET:careerpilot}
    access-key: ${MINIO_ACCESS_KEY:}
    secret-key: ${MINIO_SECRET_KEY:}
    path-style: true

kafka:
  topics:
    workflow-events: careerpilot.workflow.events
    audit-events: careerpilot.audit.events

careerpilot:
  kafka:
    # When false (or Kafka unreachable), workflow event publishing is skipped
    # silently so a missing/broken broker never breaks the workflow path.
    enabled: ${KAFKA_ENABLED:true}

# ---- Phase 2 Job Discovery ----
# Real-job ingest from adapter providers. Keyless providers (RemoteOK, Arbeitnow)
# always run; keyed providers (Adzuna, Jooble) are skipped until their keys are set,
# so the platform works on free infra with zero extra config.
jobs:
  # ---- Recommendation engine (rule-based 6-factor scoring + LLM explanations) ----
  # All flag-gated for instant rollback: v2-enabled=false reverts Recommended to the
  # legacy unthresholded behavior with no redeploy.
  enrich:
    enabled: ${JOB_ENRICH_ENABLED:true}          # keyword classification at ingest
    # ---- LLM job enrichment (Phase 2 Increment B) ----
    # Semantic enrichment the keyword tier can't derive (seniority/skills/domains/salary-band/summary),
    # via the AI Gateway. Stored in the 1:1 job_ai_enrichment table; produced-but-not-consumed in v1
    # (matching does not read it yet). Gated DARK by default → zero LLM cost / no behavior change.
    ai:
      enabled: ${JOBS_ENRICH_AI_ENABLED:false}
      # Cap on how many missing-enrichment jobs are enriched per run (scheduler + backfill) — cost guard.
      max-per-run: ${JOBS_ENRICH_AI_MAX_PER_RUN:200}
      # Max characters of the job description sent to the LLM (cost + payload guard).
      max-chars: ${JOBS_ENRICH_AI_MAX_CHARS:6000}
      # Per-call provider preference for this structured-extraction task: prefer a FAST model
      # (gemini flash) over the default deepseek reasoning model (~68s/job → a few seconds). Still
      # falls back to the rest of the gateway chain on failure. Comma-separated; first configured wins.
      providers: ${JOBS_ENRICH_AI_PROVIDERS:gemini}
  # ---- Fuzzy job deduplication (Phase 2 Increment C) ----
  # Detects cross-source duplicate postings (same job on RemoteOK and Arbeitnow, say) via embedding
  # cosine similarity (Increment A) confirmed by title/company text match. Stored in job_duplicates;
  # produced-but-not-consumed in v1 — Browse/Recommended/Discovered do NOT filter on this yet.
  # Gated DARK by default → no rows written until explicitly flipped on.
  dedup:
    enabled: ${JOBS_DEDUP_ENABLED:false}
    # Cap on how many unchecked jobs are duplicate-checked per run (scheduler + backfill).
    max-per-run: ${JOBS_DEDUP_MAX_PER_RUN:200}
    # Minimum cosine similarity (1 - distance) for a neighbor to even be considered a candidate.
    embedding-threshold: ${JOBS_DEDUP_EMBEDDING_THRESHOLD:0.92}
    # Minimum title-token Jaccard similarity required when company names don't match exactly.
    title-jaccard-threshold: ${JOBS_DEDUP_TITLE_JACCARD_THRESHOLD:0.55}
  # ---- Industry / job-family quality filter ----
  # Excludes non-technical families (Marketing/Sales/HR/Recruiter/Support/Finance) from a tech
  # candidate's recommendations. The candidate's own family is never excluded. Flag-gated for
  # instant rollback: false = no family-based exclusion (legacy behavior).
  industry:
    filter-enabled: ${JOB_INDUSTRY_FILTER:true}
  # ---- Candidate-signal source for job matching (Phase 1 single-source-of-truth) ----
  # false (default) = matcher reads candidate signals from the legacy WorkflowRun snapshot +
  # live candidate_preferences (pre-Phase-1 behavior, unchanged). true = matcher reads from the
  # canonical CandidateProfile (resolved by CandidateSignalResolver), falling back to legacy only
  # for users who have no profile row yet. Flip on AFTER profiles are backfilled; instant rollback.
  matching:
    profile-source-enabled: ${JOBS_MATCHING_PROFILE_SOURCE_ENABLED:false}
    # When true, the matcher scores against the AI-enriched normalized_skills (job_ai_enrichment)
    # instead of the raw, often-generic provider jobs.skills column, for any job that has an
    # enrichment row — so prose-only listings match a candidate on their real tech stack. Falls back
    # to the raw skills for unenriched jobs. Requires JOBS_ENRICH_AI_ENABLED to have populated
    # enrichment. Default off; instant rollback.
    use-enrichment: ${JOBS_MATCHING_USE_ENRICHMENT:false}
  recommendation:
    v2-enabled: ${JOB_RECO_V2_ENABLED:true}      # gate Recommended on score+confidence
    threshold: ${JOB_RECO_THRESHOLD:70}          # min match score for Recommended + Browse boundary (spec: 70)
    # Full-spec Recommended gate: score >= gate-min-score AND >= 1 matched role family AND
    # >= gate-min-skills matched skill families. false = legacy top-N-by-score (instant rollback).
    strict-gate-enabled: ${JOB_RECO_STRICT_GATE:true}
    gate-min-score: ${JOB_RECO_GATE_MIN_SCORE:70}
    gate-min-skills: ${JOB_RECO_GATE_MIN_SKILLS:3}
  explain:
    enabled: ${JOB_EXPLAIN_ENABLED:true}         # "Why am I a match?" LLM endpoint
  discovery:
    enabled: ${JOB_DISCOVERY_ENABLED:true}
    # When true, Domestic/International tabs derive their country set from the candidate's own
    # profile (home country / preferred countries) instead of the client-supplied country param,
    # and user-excluded roles are filtered out. Default off → legacy behavior, instant rollback.
    scope-strict-enabled: ${JOBS_DISCOVERY_SCOPE_STRICT_ENABLED:false}
    # Daily at 06:00. Tighten to hourly later ("0 0 * * * *") with no code change.
    cron: ${JOB_DISCOVERY_CRON:0 0 6 * * *}
    user-agent: ${JOB_DISCOVERY_USER_AGENT:CareerPilotAI/1.0 (+https://careerpilot.ai)}
    providers:
      remoteok:
        base-url: ${REMOTEOK_BASE_URL:https://remoteok.com}
      arbeitnow:
        base-url: ${ARBEITNOW_BASE_URL:https://www.arbeitnow.com}
      adzuna:
        base-url: ${ADZUNA_BASE_URL:https://api.adzuna.com}
        app-id: ${ADZUNA_APP_ID:}
        app-key: ${ADZUNA_APP_KEY:}
        countries: ${ADZUNA_COUNTRIES:gb,us,in}
        results-per-page: ${ADZUNA_RESULTS_PER_PAGE:50}
      jooble:
        base-url: ${JOOBLE_BASE_URL:https://jooble.org}
        api-key: ${JOOBLE_API_KEY:}
        keywords: ${JOOBLE_KEYWORDS:software engineer,data engineer}

# ---- Candidate Intelligence Profile (Phase 1) ----
# Canonical AI-analyzed profile = resume intelligence merged with a snapshot of
# candidate_preferences. Ships DARK: enabled=false → event listeners no-op and the
# /api/candidate-profile endpoints return 404, so there is zero behavior change until
# explicitly flipped on after validation. Consumed by job matching/discovery once the relevant
# downstream flag (jobs.matching.profile-source-enabled / candidate.profile.single-source-enabled)
# is also on.
candidate:
  profile:
    enabled: ${CANDIDATE_PROFILE_ENABLED:false}
    # Cap on resume characters sent to the LLM extraction (cost/latency guard).
    max-resume-chars: ${CANDIDATE_PROFILE_MAX_RESUME_CHARS:12000}
    backfill:
      # Pause between LLM extractions during the one-time enablement backfill, so generating
      # profiles for every existing user stays within the shared provider rate limits.
      throttle-ms: ${CANDIDATE_PROFILE_BACKFILL_THROTTLE_MS:500}
    # Phase 1.5 — when true, Domestic/International discovery and excluded-role filtering read the
    # canonical CandidateProfile (via CandidateSignalResolver.resolveLocationSignals), falling back
    # to live candidate_preferences for users with no profile row yet. Independent of
    # jobs.matching.profile-source-enabled (which only gates the Recommended-tab matcher) so the two
    # consumer groups can be migrated on separate schedules. Default off; instant rollback.
    single-source-enabled: ${PROFILE_SINGLE_SOURCE_ENABLED:false}
    rebuild:
      # Phase 1.5 — weekly catch-up rebuild for users whose cached extraction has drifted from their
      # latest resume (e.g. after a prompt/schema change). Reuses the same idempotent
      # needsBackfill/backfillUser fingerprint check as the one-time enablement backfill, so a
      # crashed run simply re-evaluates staleness next time. Default off; instant rollback.
      enabled: ${CANDIDATE_PROFILE_REBUILD_ENABLED:false}
      cron: ${CANDIDATE_PROFILE_REBUILD_CRON:0 0 2 ? * SUN}
      max-per-run: ${CANDIDATE_PROFILE_REBUILD_MAX_PER_RUN:200}
  recommendation:
    # Phase 1.5 — persists the per-job scoring breakdown (skill/role/preference/location/visa/salary/
    # final) from JobScoring.scoreV2 into recommendation_audit, for explainability. Purely additive
    # side effect after scoring; never affects the returned recommendation. Default off.
    audit-enabled: ${CANDIDATE_RECOMMENDATION_AUDIT_ENABLED:false}

logging:
  level:
    root: INFO
    ai.careerpilot: DEBUG
