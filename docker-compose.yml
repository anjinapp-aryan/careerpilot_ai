# NOTE: Postgres is external (Neon serverless) — see DATABASE_URL / DATABASE_URL_PY in .env.
# The local `postgres` service was removed; Flyway will baseline against the existing Neon
# schema (V1__init.sql already applied manually). To return to a local Postgres later,
# re-add the postgres service block and switch DATABASE_URL back to jdbc:postgresql://postgres:5432/...

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  agent-service:
    build: ./agent-service
    environment:
      DATABASE_URL_PY: ${DATABASE_URL_PY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      AI_PROVIDER: ${AI_PROVIDER}
      AI_MODEL: ${AI_MODEL}
      DEEP_SHEEK_NVIDIA_API_KEY: ${DEEP_SHEEK_NVIDIA_API_KEY}
      NVIDIA_BASE_URL: ${NVIDIA_BASE_URL}
      NVIDIA_DEEPSEEK_MODEL: ${NVIDIA_DEEPSEEK_MODEL}
      NVIDIA_QWEN_MODEL: ${NVIDIA_QWEN_MODEL}
      QWEN3_NVIDIA_API_KEY: ${QWEN3_NVIDIA_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "8088:8088"

  backend:
    build: ./backend
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://${REDIS_HOST}:${REDIS_PORT}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DEEP_SHEEK_NVIDIA_API_KEY: ${DEEP_SHEEK_NVIDIA_API_KEY}
      NVIDIA_BASE_URL: ${NVIDIA_BASE_URL}
      NVIDIA_DEEPSEEK_MODEL: ${NVIDIA_DEEPSEEK_MODEL}
      NVIDIA_QWEN_MODEL: ${NVIDIA_QWEN_MODEL}
      QWEN3_NVIDIA_API_KEY: ${QWEN3_NVIDIA_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-qwen/qwen3-next-80b-a3b-instruct:free}
      AI_SMART_ROUTER_ENABLED: ${AI_SMART_ROUTER_ENABLED:-false}
      PRIMARY_PROVIDER: ${PRIMARY_PROVIDER}
      AI_PROVIDER_ORDER: ${AI_PROVIDER_ORDER}
      # Phase 1 Candidate Intelligence Profile — default DARK (no behavior change).
      CANDIDATE_PROFILE_ENABLED: ${CANDIDATE_PROFILE_ENABLED:-false}
      JOBS_MATCHING_PROFILE_SOURCE_ENABLED: ${JOBS_MATCHING_PROFILE_SOURCE_ENABLED:-false}
      JOBS_MATCHING_USE_ENRICHMENT: ${JOBS_MATCHING_USE_ENRICHMENT:-false}
      JOBS_MATCHING_ROLE_RELEVANCE_MIN: ${JOBS_MATCHING_ROLE_RELEVANCE_MIN:-10}
      JOBS_MATCHING_SKILL_DENOM_CAP: ${JOBS_MATCHING_SKILL_DENOM_CAP:-8}
      JOB_RECO_GATE_MIN_SKILLS: ${JOB_RECO_GATE_MIN_SKILLS:-2}
      # Recommended-gate score floor (0-100). 70 = strict curated list; lower → more breadth.
      JOB_RECO_GATE_MIN_SCORE: ${JOB_RECO_GATE_MIN_SCORE:-70}
      CANDIDATE_PROFILE_BACKFILL_THROTTLE_MS: ${CANDIDATE_PROFILE_BACKFILL_THROTTLE_MS:-500}
      # Phase 1.5 — single source of truth hardening. All default DARK (no behavior change).
      PROFILE_SINGLE_SOURCE_ENABLED: ${PROFILE_SINGLE_SOURCE_ENABLED:-false}
      CANDIDATE_PROFILE_REBUILD_ENABLED: ${CANDIDATE_PROFILE_REBUILD_ENABLED:-false}
      CANDIDATE_PROFILE_REBUILD_CRON: "${CANDIDATE_PROFILE_REBUILD_CRON:-0 0 2 ? * SUN}"
      CANDIDATE_PROFILE_REBUILD_MAX_PER_RUN: ${CANDIDATE_PROFILE_REBUILD_MAX_PER_RUN:-200}
      CANDIDATE_RECOMMENDATION_AUDIT_ENABLED: ${CANDIDATE_RECOMMENDATION_AUDIT_ENABLED:-false}
      # Domestic/International scope derived server-side from the candidate (home/preferred countries).
      JOBS_DISCOVERY_SCOPE_STRICT_ENABLED: ${JOBS_DISCOVERY_SCOPE_STRICT_ENABLED:-false}
      # Adzuna keyed provider — sources jobs PER COUNTRY (incl. India 'in'). Empty keys = provider
      # skipped (isConfigured()=false), so this stays dormant until real keys are set in .env.
      ADZUNA_APP_ID: ${ADZUNA_APP_ID:-}
      ADZUNA_APP_KEY: ${ADZUNA_APP_KEY:-}
      ADZUNA_COUNTRIES: ${ADZUNA_COUNTRIES:-in,us,gb}
      JOOBLE_API_KEY: ${JOOBLE_API_KEY:-}
      # Phase 2 Increment A — pgvector semantic embeddings (reuses GEMINI_API_KEY). Default off.
      EMBEDDINGS_ENABLED: ${EMBEDDINGS_ENABLED:-false}
      EMBEDDINGS_MAX_PER_RUN: ${EMBEDDINGS_MAX_PER_RUN:-200}
      # Phase 2 Increment B — LLM job enrichment (reuses the AI Gateway). Default off (ships dark).
      JOBS_ENRICH_AI_ENABLED: ${JOBS_ENRICH_AI_ENABLED:-false}
      JOBS_ENRICH_AI_MAX_PER_RUN: ${JOBS_ENRICH_AI_MAX_PER_RUN:-200}
      # Phase 2 Increment C — fuzzy job deduplication (reuses embeddings). Default off (ships dark).
      JOBS_DEDUP_ENABLED: ${JOBS_DEDUP_ENABLED:-false}
      JOBS_DEDUP_MAX_PER_RUN: ${JOBS_DEDUP_MAX_PER_RUN:-200}
      AGENT_SERVICE_URL: ${AGENT_SERVICE_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      MINIO_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      MINIO_BUCKET: ${S3_BUCKET}
      MINIO_ACCESS_KEY: ${S3_ACCESS_KEY}
      MINIO_SECRET_KEY: ${S3_SECRET_KEY}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "5173:80"

volumes:
  miniodata: {}
