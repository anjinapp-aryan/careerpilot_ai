# Koyeb service definition for the FastAPI + LangGraph agent service.
# Deploy with:
#   koyeb app init careerpilot --git github.com/<you>/careerpilot_ai --git-branch main
#   koyeb service create agent --app careerpilot --git github.com/<you>/careerpilot_ai \
#     --git-branch main --git-builder docker --git-docker-dockerfile agent-service/Dockerfile \
#     --git-docker-context agent-service --ports 8088:http --routes /:8088 --instance-type free \
#     --env-file koyeb.agent.env
# Or import this file with: koyeb deploy --file koyeb.agent.yaml
name: agent
type: WEB
instance_type: free
regions:
  - was   # Washington, D.C. — closest free-tier region to most US users
scaling:
  min: 1
  max: 1
ports:
  - port: 8088
    protocol: http
routes:
  - path: /
    port: 8088
health_checks:
  - http:
      path: /health
      port: 8088
    grace_period: 30
    interval: 30
    restart_limit: 3
    timeout: 5
git:
  build:
    docker:
      dockerfile: agent-service/Dockerfile
      context: agent-service
env:
  - key: PORT
    value: "8088"
  - key: AI_PROVIDER
    value: gemini
  - key: AI_MODEL
    value: gemini-2.5-flash      # cheaper/faster; matches free-tier Gemini rate limits
  - key: GEMINI_API_KEY
    type: SECRET                  # set value in Koyeb dashboard or via `koyeb secret create`
  - key: DATABASE_URL_PY
    type: SECRET                  # Neon DIRECT (no -pooler) libpq URL
  - key: CORS_ALLOWED_ORIGINS
    value: https://your-app.vercel.app
  - key: LOG_LEVEL
    value: INFO
